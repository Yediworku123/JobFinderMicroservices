server:
  port: 8088

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: profile-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/profile/**
          filters:
            - StripPrefix=1

        - id: job-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/jobs/**
          filters:
            - StripPrefix=1

        - id: application-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/applications/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  http://localhost:8280/realms/jobfindermultiserver